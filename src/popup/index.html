<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMind</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-row">
        <div class="header-brand">
          <img src="/assets/logo.png" alt="TabMind" class="header-logo" />
          <div class="header-brand-text">
            <h1 class="logo-text">TabMind</h1>
            <p class="subtitle-text">Intelligent workspace manager</p>
          </div>
        </div>
        <button id="prefSettingsToggle" class="icon-btn" title="Preference Learning">🧠</button>
        <button id="aiSettingsToggle" class="icon-btn" title="AI Settings">⚙</button>
      </div>
    </header>

    <!-- AI Settings Panel (collapsed by default) -->
    <section id="aiSettingsPanel" class="ai-settings-panel" style="display: none;">
      <div class="ai-settings-header">
        <span class="ai-settings-title">AI Provider</span>
        <span id="aiStatusIndicator" class="ai-status-dot offline" title="Not connected"></span>
      </div>
      <div class="input-group">
        <label for="aiProvider" class="input-label">Provider</label>
        <select id="aiProvider" class="sort-select">
          <option value="ollama">Ollama (Local)</option>
          <option value="gemini">Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="groq">Groq</option>
        </select>
      </div>

      <!-- Ollama Settings -->
      <div id="provider-ollama" class="provider-section">
        <div class="input-group">
          <label for="aiEndpoint" class="input-label">Endpoint</label>
          <input type="text" id="aiEndpoint" class="text-input ai-input" placeholder="http://localhost:11434" autocomplete="off">
        </div>
        <div class="input-group">
          <label for="aiModel" class="input-label">Model</label>
          <input type="text" id="aiModel" class="text-input ai-input" placeholder="qwen3:4b" autocomplete="off">
        </div>
      </div>

      <!-- Gemini Settings -->
      <div id="provider-gemini" class="provider-section" style="display:none;">
        <div class="input-group">
          <label for="geminiApiKey" class="input-label">API Key</label>
          <input type="password" id="geminiApiKey" class="text-input ai-input" placeholder="Paste your Gemini API key" autocomplete="off">
        </div>
        <div class="input-group">
          <label for="geminiModel" class="input-label">Model <span class="input-hint">(optional)</span></label>
          <input type="text" id="geminiModel" class="text-input ai-input" placeholder="gemini-2.5-flash" autocomplete="off">
        </div>
      </div>

      <!-- OpenRouter Settings -->
      <div id="provider-openrouter" class="provider-section" style="display:none;">
        <div class="input-group">
          <label for="openRouterApiKey" class="input-label">API Key</label>
          <input type="password" id="openRouterApiKey" class="text-input ai-input" placeholder="Paste your OpenRouter API key" autocomplete="off">
        </div>
        <div class="input-group">
          <label for="openRouterModel" class="input-label">Model <span class="input-hint">(optional)</span></label>
          <input type="text" id="openRouterModel" class="text-input ai-input" placeholder="google/gemini-2.5-flash" autocomplete="off">
        </div>
      </div>

      <!-- Groq Settings -->
      <div id="provider-groq" class="provider-section" style="display:none;">
        <div class="input-group">
          <label for="groqApiKey" class="input-label">API Key</label>
          <input type="password" id="groqApiKey" class="text-input ai-input" placeholder="Paste your Groq API key" autocomplete="off">
        </div>
        <div class="input-group">
          <label for="groqModel" class="input-label">Model <span class="input-hint">(optional)</span></label>
          <input type="text" id="groqModel" class="text-input ai-input" placeholder="llama-3.3-70b-versatile" autocomplete="off">
        </div>
      </div>

      <div class="ai-settings-actions">
        <button id="aiTestBtn" class="tool-btn ai-test-btn">Test Connection</button>
        <button id="aiSaveBtn" class="tool-btn ai-save-btn">Save</button>
      </div>
    </section>

    <!-- Preference Learning Panel (collapsed by default) -->
    <section id="prefSettingsPanel" class="pref-settings-panel" style="display: none;">
      <div class="pref-settings-header">
        <span class="pref-settings-title">Preference Learning</span>
        <label class="toggle-label">
          <input type="checkbox" id="learningToggle" checked>
          <span class="toggle-switch"></span>
        </label>
      </div>
      <div id="prefStatsContainer" class="pref-stats-container">
        <div class="pref-stat-item">
          <span class="pref-stat-value" id="prefDomainCount">0</span>
          <span class="pref-stat-label">Domains</span>
        </div>
        <div class="pref-stat-item">
          <span class="pref-stat-value" id="prefPatternCount">0</span>
          <span class="pref-stat-label">Patterns</span>
        </div>
        <div class="pref-stat-item">
          <span class="pref-stat-value" id="prefNamingCount">0</span>
          <span class="pref-stat-label">Names</span>
        </div>
        <div class="pref-stat-item">
          <span class="pref-stat-value" id="prefCorrectionCount">0</span>
          <span class="pref-stat-label">Corrections</span>
        </div>
      </div>
      <div class="pref-actions">
        <button id="prefExportBtn" class="tool-btn">Export Memory</button>
        <button id="prefClearBtn" class="tool-btn pref-clear-btn">Clear Memory</button>
      </div>
    </section>

    <!-- AI Organize Button -->
    <section class="ai-organize-section">
      <select id="organizeProvider" class="organize-provider-select" title="AI Provider">
        <option value="ollama">Ollama</option>
        <option value="gemini">Gemini</option>
        <option value="openrouter">OpenRouter</option>
        <option value="groq">Groq</option>
      </select>
      <button id="organizeBtn" class="organize-btn">
        <span class="organize-icon">✦</span>
        Organize Tabs with AI
      </button>
    </section>

    <!-- Workspace Save Form -->
    <section class="form-section">
      <div class="input-group">
        <label for="workspaceName" class="input-label">Workspace Name</label>
        <input 
          type="text" 
          id="workspaceName" 
          class="text-input" 
          placeholder="e.g., Qdrant vs Pinecone Research"
          autocomplete="off"
        >
      </div>

      <div class="input-group">
        <label for="workspaceNotes" class="input-label">Workspace Notes</label>
        <textarea 
          id="workspaceNotes" 
          class="textarea-input" 
          placeholder="Add summaries, goals, or tasks..."
          rows="3"
        ></textarea>
      </div>

      <button id="saveBtn" class="primary-btn" disabled>
        Save Current Window
      </button>
    </section>

    <!-- Statistics Bar -->
    <section id="statsSection" class="stats-section" style="display: none;"></section>

    <!-- AI Insights -->
    <section id="aiInsightsSection" class="insights-section" style="display: none;"></section>

    <!-- Search & Sort Controls -->
    <section class="controls-section">
      <input 
        type="text" 
        id="searchInput" 
        class="text-input search-input" 
        placeholder="Search workspaces..."
        autocomplete="off"
      >
      <select id="sortSelect" class="sort-select">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="most_tabs">Most Tabs</option>
        <option value="least_tabs">Least Tabs</option>
      </select>
    </section>

    <!-- Workspace List Area -->
    <section class="workspace-section">
      <div class="workspace-section-header">
        <h2 class="section-title">Saved Workspaces</h2>
        <button id="bulkSummariesBtn" class="bulk-summaries-btn" style="display: none;">
          <span class="summary-btn-icon">✦</span> Generate Missing Summaries
        </button>
      </div>
      <div id="bulkProgressContainer" class="bulk-progress-container" style="display: none;"></div>
      <div id="workspaceList"></div>
    </section>

    <!-- Import / Export Tools -->
    <section class="tools-section">
      <button id="exportBtn" class="tool-btn">Export Backup</button>
      <button id="importBtn" class="tool-btn">Import Backup</button>
      <input type="file" id="importFileInput" accept=".json" style="display: none;">
    </section>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="footer-brand">
        <img src="/assets/logo.png" alt="" class="footer-logo" />
        <span class="footer-text">TabMind</span>
      </div>
      <span class="version-badge">v4.6.0</span>
    </footer>
  </div>

  <!-- Import Preview Modal -->
  <div id="importModal" class="modal-overlay" style="display: none;"></div>

  <!-- AI Organize Preview Modal -->
  <div id="organizeModal" class="modal-overlay" style="display: none;"></div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
